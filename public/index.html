<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KJV Bible | Fast Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #F4EFE6;
            font-family: 'Segoe UI', 'Merriweather', 'Georgia', serif;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -85%;
            width: 85%;
            max-width: 340px;
            height: 100%;
            background: #FFFCF7;
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #E2D5C2;
            overflow: hidden;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 1.6rem 1.2rem;
            background: #2E3B2C;
            color: #FEF5E6;
        }
        .sidebar-header h2 {
            font-size: 1.45rem;
            font-weight: 500;
        }
        .sidebar-header p {
            font-size: 0.7rem;
            opacity: 0.85;
            margin-top: 6px;
        }
        .book-search {
            padding: 12px 16px;
            background: #F9F4EA;
            border-bottom: 1px solid #E9DECC;
        }
        .book-search input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #DDCEB6;
            background: white;
            font-size: 0.9rem;
            outline: none;
        }
        .books-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0.8rem;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 12px;
        }
        .book-btn {
            background: white;
            border: 1px solid #E1D4C0;
            text-align: left;
            padding: 10px 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #3D2F1D;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .book-btn.active {
            background: #EADDBF;
            border-color: #B58F45;
            font-weight: 600;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #FFFCF8;
            width: 100%;
        }

        .top-bar {
            background: #FFFFFF;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #EEE3D4;
            flex-wrap: wrap;
            gap: 12px;
        }
        .left-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .hamburger {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #5E4C30;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hamburger:active {
            background: #EFE6DA;
        }
        .book-title-header {
            font-size: 1.3rem;
            font-weight: 600;
            color: #5A472A;
        }
        .chapter-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #F8F3EA;
            padding: 5px 14px;
            border-radius: 48px;
        }
        .chapter-picker label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #8B734C;
        }
        .chapter-nav-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .chapter-nav-buttons button {
            background: #E8DCCB;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            color: #4F3F28;
        }
        #chapterSelectDropdown {
            background: white;
            border: 1px solid #CFC1AC;
            border-radius: 32px;
            padding: 7px 10px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: monospace;
            cursor: pointer;
            outline: none;
            width: 75px;
            text-align: center;
        }
        .random-chapter {
            background: #CBAF5E;
            border: none;
            padding: 6px 14px;
            border-radius: 32px;
            font-weight: 600;
            color: #2A2418;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .scripture-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.4rem 1.2rem 2rem;
        }
        .verse-card {
            max-width: 1000px;
            margin: 0 auto;
        }
        .chapter-head {
            border-left: 6px solid #C6A15B;
            padding-left: 18px;
            margin-bottom: 1.6rem;
        }
        .chapter-head h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #4C3C22;
        }
        .chapter-head span {
            font-size: 0.8rem;
            color: #A28C64;
        }
        .verses-list {
            font-size: 1.08rem;
            line-height: 1.7;
            color: #2A2A24;
        }
        .verse-block {
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            background: #FEFCF8;
            padding: 0.4rem 0.8rem;
            border-radius: 14px;
            transition: background 0.2s;
        }
        .verse-block:hover {
            background: #F9F5EC;
        }
        .verse-number {
            font-weight: 800;
            color: #B48C48;
            font-size: 1rem;
            margin-right: 12px;
            min-width: 36px;
            font-family: monospace;
        }
        .verse-text {
            flex: 1;
            font-weight: 500;
            color: #1F2A1A;
        }
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: #8F7A58;
        }
        .error-box {
            background: #FEF1EB;
            padding: 1.5rem;
            border-radius: 24px;
            color: #AF5A41;
            border-left: 5px solid #c96f56;
        }
        @media (max-width: 650px) {
            .verses-list { font-size: 0.98rem; }
            .verse-number { min-width: 32px; font-size: 0.85rem; }
            .chapter-head h1 { font-size: 1.5rem; }
            .top-bar { padding: 0.5rem; }
            .chapter-picker { gap: 5px; padding: 5px 8px; }
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #E2D4BC;
            border-top: 2px solid #CBAF5E;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Scrollbar Styling */
        .scripture-container::-webkit-scrollbar,
        .books-list::-webkit-scrollbar {
            width: 6px;
        }
        .scripture-container::-webkit-scrollbar-track,
        .books-list::-webkit-scrollbar-track {
            background: #F0E8DC;
        }
        .scripture-container::-webkit-scrollbar-thumb,
        .books-list::-webkit-scrollbar-thumb {
            background: #CBB68E;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📖 KJV Bible</h2>
            <p>Fast · Complete chapters</p>
        </div>
        <div class="book-search">
            <input type="text" id="bookFilter" placeholder="Search book... 🔍" autocomplete="off">
        </div>
        <div class="books-list" id="booksListContainer"></div>
    </div>
    <div class="overlay" id="overlay"></div>

    <div class="main-content">
        <div class="top-bar">
            <div class="left-group">
                <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
                <div class="book-title-header" id="currentBookName">Philippians</div>
            </div>
            <div class="chapter-picker">
                <label>📖 CHAPTER</label>
                <div class="chapter-nav-buttons">
                    <button id="prevChapterBtn" aria-label="Previous Chapter">◀</button>
                    <select id="chapterSelectDropdown" aria-label="Chapter Select"></select>
                    <button id="nextChapterBtn" aria-label="Next Chapter">▶</button>
                </div>
                <button id="randomChapterBtn" class="random-chapter">✨ Random</button>
            </div>
        </div>

        <div class="scripture-container" id="scriptureContainer">
            <div class="verse-card">
                <div class="chapter-head">
                    <h1 id="chapterTitle">Philippians 1</h1>
                    <span>King James Version (KJV)</span>
                </div>
                <div id="versesDisplay" class="verses-list">
                    <div class="loading-state"><span class="spinner"></span> Loading...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // State
    let currentDisplayBook = "Philippians";
    let currentChapter = 1;
    let isLoading = false;
    let verseCache = {};
    let maxChaptersData = {};

    // DOM elements
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const booksListContainer = document.getElementById('booksListContainer');
    const bookFilterInput = document.getElementById('bookFilter');
    const currentBookNameSpan = document.getElementById('currentBookName');
    const chapterSelectDropdown = document.getElementById('chapterSelectDropdown');
    const prevChapterBtn = document.getElementById('prevChapterBtn');
    const nextChapterBtn = document.getElementById('nextChapterBtn');
    const randomChapterBtn = document.getElementById('randomChapterBtn');
    const chapterTitle = document.getElementById('chapterTitle');
    const versesDisplay = document.getElementById('versesDisplay');

    // API Base URL (automatically detects if running locally or on Vercel)
    const API_BASE = window.location.origin;

    function openSidebar() { 
        sidebar.classList.add('open'); 
        overlay.classList.add('active'); 
        document.body.style.overflow = 'hidden';
    }
    
    function closeSidebar() { 
        sidebar.classList.remove('open'); 
        overlay.classList.remove('active'); 
        document.body.style.overflow = '';
    }
    
    hamburgerBtn.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    // Fetch books list from backend API
    async function fetchBooks() {
        try {
            const response = await fetch(`${API_BASE}/api/books`);
            const data = await response.json();
            if (data.success) {
                maxChaptersData = data.chapters;
                return data.books;
            }
            throw new Error('Failed to fetch books');
        } catch (error) {
            console.error('Error fetching books:', error);
            return [];
        }
    }

    async function renderBooks(filter = '') {
        const allBooks = await fetchBooks();
        const filtered = allBooks.filter(book => book.toLowerCase().includes(filter.toLowerCase()));
        booksListContainer.innerHTML = '';
        
        if (filtered.length === 0) {
            const emptyMsg = document.createElement('div');
            emptyMsg.textContent = '📭 No matching books';
            emptyMsg.style.gridColumn = 'span 2';
            emptyMsg.style.padding = '1rem';
            emptyMsg.style.textAlign = 'center';
            emptyMsg.style.color = '#A48F6C';
            booksListContainer.appendChild(emptyMsg);
            return;
        }
        
        filtered.forEach(book => {
            const btn = document.createElement('button');
            btn.className = 'book-btn';
            if (book === currentDisplayBook) btn.classList.add('active');
            btn.textContent = book;
            btn.addEventListener('click', async () => {
                if (currentDisplayBook !== book) {
                    currentDisplayBook = book;
                    currentChapter = 1;
                    await updateChapterDropdown();
                    await loadChapterContent();
                    await renderBooks(bookFilterInput.value);
                    currentBookNameSpan.textContent = currentDisplayBook;
                    closeSidebar();
                } else {
                    closeSidebar();
                }
            });
            booksListContainer.appendChild(btn);
        });
    }

    async function updateChapterDropdown() {
        try {
            const response = await fetch(`${API_BASE}/api/book/${encodeURIComponent(currentDisplayBook)}`);
            const data = await response.json();
            
            if (!data.success) {
                throw new Error('Book not found');
            }
            
            const maxChap = data.maxChapters;
            if (currentChapter > maxChap) currentChapter = maxChap;
            
            chapterSelectDropdown.innerHTML = '';
            for (let i = 1; i <= maxChap; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                if (i === currentChapter) option.selected = true;
                chapterSelectDropdown.appendChild(option);
            }
            return maxChap;
        } catch (error) {
            console.error('Error updating chapter dropdown:', error);
            return 0;
        }
    }

    // Fetch chapter from backend API
    async function fetchFullChapter(book, chapterNum) {
        const cacheKey = `${book}_${chapterNum}`;
        if (verseCache[cacheKey]) return verseCache[cacheKey];

        try {
            const response = await fetch(`${API_BASE}/api/bible/${encodeURIComponent(book)}/${chapterNum}`);
            const data = await response.json();
            
            if (!data.success) {
                throw new Error(data.error || 'Failed to fetch chapter');
            }
            
            verseCache[cacheKey] = data.verses;
            return data.verses;
        } catch (error) {
            console.error('Error fetching chapter:', error);
            throw error;
        }
    }

    async function loadChapterContent() {
        if (isLoading) return;
        isLoading = true;
        versesDisplay.innerHTML = `<div class="loading-state"><span class="spinner"></span> Loading ${currentDisplayBook} ${currentChapter}...</div>`;
        chapterTitle.textContent = `${currentDisplayBook} ${currentChapter}`;
        
        try {
            const verses = await fetchFullChapter(currentDisplayBook, currentChapter);
            chapterSelectDropdown.value = currentChapter;
            currentBookNameSpan.textContent = currentDisplayBook;
            
            let html = '';
            for (let v of verses) {
                html += `
                    <div class="verse-block">
                        <div class="verse-number">${v.number}</div>
                        <div class="verse-text">${escapeHtml(v.text)}</div>
                    </div>
                `;
            }
            versesDisplay.innerHTML = html;
            chapterTitle.textContent = `${currentDisplayBook} ${currentChapter}`;
            
            // Scroll to top when loading new chapter
            document.querySelector('.scripture-container').scrollTop = 0;
        } catch (err) {
            console.error(err);
            versesDisplay.innerHTML = `<div class="error-box">⚠️ Could not load ${currentDisplayBook} ${currentChapter}.<br><small>${err.message}</small><br><br>💡 Tip: Check your internet connection and try again.</div>`;
        } finally {
            isLoading = false;
        }
    }
    
    // Helper function to escape HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function changeChapter(delta) {
        if (isLoading) return;
        
        try {
            const response = await fetch(`${API_BASE}/api/book/${encodeURIComponent(currentDisplayBook)}`);
            const data = await response.json();
            const maxChap = data.maxChapters;
            
            let newChap = currentChapter + delta;
            if (newChap < 1) newChap = 1;
            if (newChap > maxChap) newChap = maxChap;
            if (newChap === currentChapter) return;
            
            currentChapter = newChap;
            chapterSelectDropdown.value = currentChapter;
            await loadChapterContent();
        } catch (error) {
            console.error('Error changing chapter:', error);
        }
    }

    async function randomChapter() {
        if (isLoading) return;
        
        try {
            const response = await fetch(`${API_BASE}/api/random`);
            const data = await response.json();
            
            if (data.success) {
                currentDisplayBook = data.book;
                currentChapter = data.chapter;
                await updateChapterDropdown();
                await loadChapterContent();
                await renderBooks(bookFilterInput.value);
                currentBookNameSpan.textContent = currentDisplayBook;
                closeSidebar();
            }
        } catch (error) {
            console.error('Error loading random chapter:', error);
        }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
            changeChapter(-1);
        } else if (e.key === 'ArrowRight') {
            changeChapter(1);
        } else if (e.key === 'Escape' && sidebar.classList.contains('open')) {
            closeSidebar();
        }
    });

    // Event listeners
    chapterSelectDropdown.addEventListener('change', async (e) => {
        if (isLoading) return;
        const newChap = parseInt(e.target.value, 10);
        if (!isNaN(newChap) && newChap !== currentChapter) {
            currentChapter = newChap;
            await loadChapterContent();
        }
    });
    
    prevChapterBtn.addEventListener('click', () => changeChapter(-1));
    nextChapterBtn.addEventListener('click', () => changeChapter(1));
    randomChapterBtn.addEventListener('click', randomChapter);
    
    bookFilterInput.addEventListener('input', (e) => {
        renderBooks(e.target.value);
    });

    // Initialize
    async function init() {
        await renderBooks('');
        await updateChapterDropdown();
        await loadChapterContent();
        currentBookNameSpan.textContent = currentDisplayBook;
        await renderBooks('');
        
        // Add touch feedback for mobile
        if ('ontouchstart' in window) {
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('touchstart', function() {
                    this.style.opacity = '0.7';
                });
                btn.addEventListener('touchend', function() {
                    this.style.opacity = '1';
                });
            });
        }
    }
    
    init();
</script>
</body>
</html>
